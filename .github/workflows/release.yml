name: Release Goomba

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: blacksmith-6vcpu-macos-15  # Intel Mac (for embedosx.sh)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version.txt from tag
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "$TAG" > internal/version/version.txt
          echo "Set version.txt to $TAG"

      - name: Validate version.txt is set
        run: |
          if [ ! -s internal/version/version.txt ]; then
            echo "version.txt is empty or missing!" >&2
            exit 1
          fi
          echo "version.txt: $(cat internal/version/version.txt)"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run embedosx.sh
        run: |
          cd internal
          ./embedosx.sh
          cd ..

      - name: Build for all platforms
        run: |
          mkdir -p dist

          build() {
            GOOS="$1" GOARCH="$2" go build -o "dist/$3" ./cmd/goomba/
            echo "Built dist/$3"
          }

          build windows amd64 goomba-windows-amd64.exe
          build windows arm64 goomba-windows-arm64.exe
          build linux   amd64 goomba-linux-amd64
          build linux   arm64 goomba-linux-arm64
          build darwin  amd64 goomba-darwin-amd64
          build darwin  arm64 goomba-darwin-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goomba-binaries
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: goomba-binaries
          path: dist/

      - name: Validate version in linux binary
        run: |
          TAG="${GITHUB_REF##*/}"
          chmod +x dist/goomba-linux-amd64
          REPORTED="$(dist/goomba-linux-amd64 --version)"
          if [ "$REPORTED" != "$TAG" ]; then
            echo "Version mismatch: expected '$TAG', got '$REPORTED'" >&2
            exit 1
          fi
          echo "Binary version OK: $REPORTED"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/goomba-windows-amd64.exe
            dist/goomba-windows-arm64.exe
            dist/goomba-linux-amd64
            dist/goomba-linux-arm64
            dist/goomba-darwin-amd64
            dist/goomba-darwin-arm64
          generate_release_notes: true
