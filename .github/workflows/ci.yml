name: Build Goomba

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: macos-13  # Intel Mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run embedosx.sh
        run: |
          cd internal
          ./embedosx.sh
          cd ..

      - name: Build for all platforms
        run: |
          declare -A targets=(
            ["windows/amd64"]="goomba-windows-amd64.exe"
            ["windows/arm64"]="goomba-windows-arm64.exe"
            ["linux/amd64"]="goomba-linux-amd64"
            ["linux/arm64"]="goomba-linux-arm64"
            ["darwin/amd64"]="goomba-darwin-amd64"
            ["darwin/arm64"]="goomba-darwin-arm64"
          )

          mkdir -p dist

          for platform in "${!targets[@]}"; do
            os="${platform%%/*}"
            arch="${platform##*/}"
            out="dist/${targets[$platform]}"

            echo "Building $out..."
            GOOS="$os" GOARCH="$arch" go build -o "$out" ./cmd/goomba/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goomba-binaries
          path: dist/