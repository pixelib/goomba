name: Goomba Build
branding:
  icon: package
  color: blue
description: Build Go projects with Goomba across platforms and architectures.
inputs:
  source-dir:
    description: Path to the Go module to build.
    required: false
    default: .
  platforms:
    description: Comma-separated list of platforms (linux, macos, windows).
    required: true
    default: linux,macos,windows
  arch:
    description: Comma-separated list of architectures (x64, arm64).
    required: true
    default: x64,arm64
  cgo-enabled:
    description: Enable CGO support.
    required: false
    default: "false"
  go-args:
    description: Additional go build args passed via --go-args.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install Goomba (macOS/Linux)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://raw.githubusercontent.com/pixelib/goomba/refs/heads/main/install.sh | bash
        echo "$HOME/.goomba/bin" >> "$GITHUB_PATH"

    - name: Install Goomba (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        irm https://raw.githubusercontent.com/pixelib/goomba/refs/heads/main/install.ps1 | iex
        "$env:LOCALAPPDATA\Programs\goomba" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Build with Goomba (macOS/Linux)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.source-dir }}
      run: |
        set -euo pipefail
        args=(build --no-tui --platforms "${{ inputs.platforms }}" --arch "${{ inputs.arch }}")
        if [ "${{ inputs.cgo-enabled }}" = "true" ]; then
          args+=(--cgo-enabled)
        fi
        if [ -n "${{ inputs.go-args }}" ]; then
          args+=(--go-args "${{ inputs.go-args }}")
        fi
        goomba "${args[@]}"

    - name: Build with Goomba (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.source-dir }}
      run: |
        $args = @("build", "--no-tui", "--platforms", "${{ inputs.platforms }}", "--arch", "${{ inputs.arch }}")
        if ("${{ inputs.cgo-enabled }}" -eq "true") {
          $args += "--cgo-enabled"
        }
        if ("${{ inputs.go-args }}") {
          $args += @("--go-args", "${{ inputs.go-args }}")
        }
        & goomba @args
